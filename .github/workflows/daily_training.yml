name: Daily AQI Model Training

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update Historical Data
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          python backfill.py --start 2022-01-01 --end $TODAY
          
      - name: Execute Training Pipeline
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python model_training.py
        
      - name: Commit and Push Data Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add shap_feature_importance.png thar_historical_training_data.parquet
          git commit -m "Automated daily data update" || echo "No changes to commit"
          git push